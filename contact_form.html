<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8a96e;
      --accent2: #7c6fe0;
      --text: #e8e6f0;
      --muted: #6b6880;
      --success: #4ecca3;
      --error: #ff6b6b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(124,111,224,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 580px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 44px;
      animation: fadeUp 0.7s ease both;
    }
    .header .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .eyebrow::after {
      content: '';
      display: block;
      height: 1px;
      width: 40px;
      background: var(--accent);
      opacity: 0.5;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 52px);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 14px;
    }
    .header p {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 420px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      position: relative;
      animation: fadeUp 0.7s 0.15s ease both;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
      border-radius: 20px 20px 0 0;
    }

    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 22px;
      animation: fadeUp 0.5s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.2s; }
    .field:nth-child(2) { animation-delay: 0.25s; }
    .field:nth-child(3) { animation-delay: 0.3s; }
    .field:nth-child(4) { animation-delay: 0.35s; }
    .field:nth-child(5) { animation-delay: 0.4s; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .field:focus-within label { color: var(--accent); }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(124,111,224,0.12);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }
    textarea { resize: vertical; min-height: 130px; line-height: 1.6; }

    select option { background: var(--surface); }

    /* Character count */
    .char-count {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 5px;
    }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--accent2) 0%, #5d52c4 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,111,224,0.35); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .btn-icon { font-size: 18px; transition: transform 0.3s; }
    .btn:hover .btn-icon { transform: translateX(4px); }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text, .btn.loading .btn-icon { display: none; }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 28px;
      right: 28px;
      padding: 16px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #0f2a20; border: 1px solid var(--success); color: var(--success); }
    .toast.error   { background: #2a0f0f; border: 1px solid var(--error);   color: var(--error);   }

    /* Info strip */
    .info-strip {
      margin-top: 28px;
      padding: 16px 20px;
      background: rgba(200,169,110,0.06);
      border: 1px solid rgba(200,169,110,0.15);
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      animation: fadeUp 0.5s 0.5s ease both;
    }
    .info-strip strong { color: var(--accent); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 520px) {
      .card { padding: 30px 22px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="eyebrow">Get in touch</div>
    <h1>Let's work<br/>together.</h1>
    <p>Have a project in mind or just want to say hello? Fill in the form and I'll get back to you within 24 hours.</p>
  </div>

  <div class="card">
    <form id="contactForm" novalidate>

      <div class="form-row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" required />
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Doe" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required />
      </div>

      <div class="field">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="" disabled selected>Select a topic…</option>
          <option value="Project Inquiry">Project Inquiry</option>
          <option value="Freelance Work">Freelance Work</option>
          <option value="Collaboration">Collaboration</option>
          <option value="Job Opportunity">Job Opportunity</option>
          <option value="General Question">General Question</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell me about your project or idea…" maxlength="1000" required></textarea>
        <div class="char-count"><span id="charCount">0</span> / 1000</div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-text">Send Message</span>
        <span class="btn-icon">→</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="info-strip">
      ⚡ <strong>Quick setup:</strong> Replace <strong>YOUR_SERVICE_ID</strong>, <strong>YOUR_TEMPLATE_ID</strong>, and <strong>YOUR_PUBLIC_KEY</strong> below with your <a href="https://www.emailjs.com" target="_blank" style="color:var(--accent)">EmailJS</a> credentials — free for 200 emails/month.
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
  // ─────────────────────────────────────────────
  // 🔑 REPLACE THESE WITH YOUR EMAILJS CREDENTIALS
  // Get them free at https://www.emailjs.com
  const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // e.g. 'service_abc123'
  const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // e.g. 'template_xyz456'
  const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // e.g. 'aBcDeFgHiJkLmNoP'
  // ─────────────────────────────────────────────

  // Init EmailJS
  emailjs.init(EMAILJS_PUBLIC_KEY);

  // Character counter
  const msgArea  = document.getElementById('message');
  const charCount = document.getElementById('charCount');
  msgArea.addEventListener('input', () => {
    charCount.textContent = msgArea.value.length;
  });

  // Toast helper
  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 4500);
  }

  // Form submit
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn   = document.getElementById('submitBtn');
    const form  = this;

    // Basic validation
    const first = form.firstName.value.trim();
    const email = form.email.value.trim();
    const subj  = form.subject.value;
    const msg   = form.message.value.trim();

    if (!first) { showToast('Please enter your first name.', 'error'); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast('Please enter a valid email address.', 'error'); return;
    }
    if (!subj)  { showToast('Please select a subject.', 'error'); return; }
    if (!msg)   { showToast('Please write a message.', 'error'); return; }

    // Loading state
    btn.disabled = true;
    btn.classList.add('loading');

    // Template parameters — these map to {{variables}} in your EmailJS template
    const templateParams = {
      from_name:  `${first} ${form.lastName.value.trim()}`.trim(),
      from_email: email,
      subject:    subj,
      message:    msg,
      reply_to:   email,
    };

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
      showToast('Message sent! I\'ll get back to you soon 🎉', 'success');
      form.reset();
      charCount.textContent = '0';
    } catch (err) {
      console.error('EmailJS error:', err);
      showToast('Oops! Something went wrong. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
